name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  APP_NAME: "Ancestry Tag Converter"
  APP_ID: "com.ajkessel.ancestry-tag-converter"
  CLI_BIN: "ancestry-tag-converter"
  GUI_PKG: "./cmd/ancestry-tag-converter-gui"

jobs:
  # ── macOS: signed .app + notarized DMG ─────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # fetch tags so manual builds can derive the version

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install fyne CLI
        run: go install fyne.io/tools/cmd/fyne@latest

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_B64: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          CERT_FILE="$RUNNER_TEMP/certificate.p12"
          echo "$CERTIFICATE_B64" | base64 --decode > "$CERT_FILE"
          security create-keychain -p "build-keychain-pw" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "build-keychain-pw" "$KEYCHAIN"
          security import "$CERT_FILE" -k "$KEYCHAIN" -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"' | xargs)
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "build-keychain-pw" "$KEYCHAIN"
          echo "=== Available signing identities ==="
          echo "=== Developer ID identities ==="
          security find-identity -v -p codesigning "$KEYCHAIN" | grep "Developer ID" || \
            echo "WARNING: No Developer ID Application certificate found — notarization will fail"

      - name: Extract version
        id: ver
        run: |
          ref="${GITHUB_REF_NAME#v}"
          if [[ "$ref" =~ ^[0-9]+(\.[0-9]+)*$ ]]; then
            version="$ref"
          else
            # Not a version tag (e.g. a manual run on a branch): fall back to the
            # most recent tag so the build still reports a real version.
            tag="$(git describe --tags --abbrev=0 2>/dev/null || true)"
            tag="${tag#v}"
            if [[ "$tag" =~ ^[0-9]+(\.[0-9]+)*$ ]]; then
              version="$tag"
            else
              version="0.0.0"
            fi
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build CLI (universal)
        # Build both architectures and merge them into a fat binary so it runs
        # natively on Intel and Apple Silicon. clang cross-compiles via -arch,
        # which keeps CGO working.
        run: |
          mkdir -p dist
          CGO_ENABLED=1 GOARCH=amd64 CC="clang -arch x86_64" CXX="clang++ -arch x86_64" \
            go build -ldflags="-s -w" -o "dist/${CLI_BIN}-amd64" .
          CGO_ENABLED=1 GOARCH=arm64 CC="clang -arch arm64" CXX="clang++ -arch arm64" \
            go build -ldflags="-s -w" -o "dist/${CLI_BIN}-arm64" .
          lipo -create -output "dist/$CLI_BIN" \
            "dist/${CLI_BIN}-amd64" "dist/${CLI_BIN}-arm64"
          rm "dist/${CLI_BIN}-amd64" "dist/${CLI_BIN}-arm64"
          lipo -info "dist/$CLI_BIN"

      - name: Package GUI as universal .app bundle
        # fyne package must run from within the package directory. It builds for
        # the host architecture (arm64); we then build an amd64 slice and lipo
        # the two into a universal binary inside the bundle.
        run: |
          cd "$GUI_PKG"
          ICON_FLAG="-icon ../../packaging/icon.png"
          # fyne reads extra linker flags from GOFLAGS; inject the version so the
          # About dialog reports it. GOFLAGS is whitespace-split, so the value
          # must be a single token (use -X=pkg.var=value form, no spaces).
          GOFLAGS="-ldflags=-X=main.version=${{ steps.ver.outputs.version }}" \
          fyne package -os darwin \
            -appID "$APP_ID" \
            -name "$APP_NAME" \
            -appVersion "${{ steps.ver.outputs.version }}" \
            -release \
            $ICON_FLAG
          mv "$APP_NAME.app" "$GITHUB_WORKSPACE/dist/"
          # Build the amd64 GUI binary and merge it into the bundle's executable.
          CGO_ENABLED=1 GOARCH=amd64 CC="clang -arch x86_64" CXX="clang++ -arch x86_64" \
            go build -ldflags="-s -w -X main.version=${{ steps.ver.outputs.version }}" \
            -o "$RUNNER_TEMP/${CLI_BIN}-gui-amd64" .
          APP_BIN="$(find "$GITHUB_WORKSPACE/dist/$APP_NAME.app/Contents/MacOS" -type f | head -n1)"
          lipo -create -output "$APP_BIN" "$APP_BIN" "$RUNNER_TEMP/${CLI_BIN}-gui-amd64"
          rm "$RUNNER_TEMP/${CLI_BIN}-gui-amd64"
          lipo -info "$APP_BIN"

      - name: Sign .app bundle
        env:
          SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          ENTITLEMENTS="$GITHUB_WORKSPACE/packaging/entitlements.plist"
          # Sign each nested binary explicitly before signing the bundle
          find "dist/$APP_NAME.app/Contents/MacOS" -type f | while read -r bin; do
            codesign --force --verify --verbose --timestamp \
              --sign "$SIGNING_IDENTITY" \
              --options runtime \
              --entitlements "$ENTITLEMENTS" \
              "$bin"
          done
          codesign --deep --force --verify --verbose --timestamp \
            --sign "$SIGNING_IDENTITY" \
            --options runtime \
            --entitlements "$ENTITLEMENTS" \
            "dist/$APP_NAME.app"

      - name: Sign CLI binary
        env:
          SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          ENTITLEMENTS="$GITHUB_WORKSPACE/packaging/entitlements.plist"
          codesign --force --verify --verbose --timestamp \
            --sign "$SIGNING_IDENTITY" \
            --options runtime \
            --entitlements "$ENTITLEMENTS" \
            "dist/$CLI_BIN"

      - name: Create DMG
        run: |
          mkdir -p dmg_staging
          cp -r "dist/$APP_NAME.app" dmg_staging/
          cp "dist/$CLI_BIN" dmg_staging/
          # Create a symlink so users can drag-install
          ln -s /Applications dmg_staging/Applications
          hdiutil create \
            -volname "$APP_NAME" \
            -srcfolder dmg_staging \
            -ov -format UDZO \
            "dist/ancestry-tag-converter-mac.dmg"

      - name: Sign DMG
        env:
          SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          codesign --force --verify --verbose --timestamp \
            --sign "$SIGNING_IDENTITY" \
            "dist/ancestry-tag-converter-mac.dmg"

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          result=$(xcrun notarytool submit "dist/ancestry-tag-converter-mac.dmg" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait \
            --output-format json)
          echo "$result"
          submission_id=$(echo "$result" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          status=$(echo "$result" | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
          if [ "$status" != "Accepted" ]; then
            echo "Notarization failed with status: $status — fetching Apple's log:"
            xcrun notarytool log "$submission_id" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_PASSWORD" \
              --team-id "$APPLE_TEAM_ID"
            exit 1
          fi

      - name: Staple notarization ticket
        run: xcrun stapler staple "dist/ancestry-tag-converter-mac.dmg"

      - name: Clean up keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/build.keychain" || true

      - uses: actions/upload-artifact@v7
        with:
          name: macos
          path: dist/ancestry-tag-converter-mac.dmg

  # ── Linux: tar.gz with CLI + GUI ───────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # fetch tags so manual builds can derive the version

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install Fyne system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev \
            libxxf86vm-dev \
            xorg-dev

      - name: Extract version
        id: ver
        run: |
          ref="${GITHUB_REF_NAME#v}"
          if [[ "$ref" =~ ^[0-9]+(\.[0-9]+)*$ ]]; then
            version="$ref"
          else
            # Not a version tag (e.g. a manual run on a branch): fall back to the
            # most recent tag so the build still reports a real version.
            tag="$(git describe --tags --abbrev=0 2>/dev/null || true)"
            tag="${tag#v}"
            if [[ "$tag" =~ ^[0-9]+(\.[0-9]+)*$ ]]; then
              version="$tag"
            else
              version="0.0.0"
            fi
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build
        run: |
          mkdir -p dist
          go build -ldflags="-s -w" -o "dist/$CLI_BIN" .
          # The GUI embeds its icon at runtime via SetIcon; inject the version so
          # the About dialog reports it (plain go build sets no app metadata).
          go build -ldflags="-s -w -X main.version=${{ steps.ver.outputs.version }}" \
            -o "dist/${CLI_BIN}-gui" "$GUI_PKG"

      - name: Package
        run: |
          tar -czf dist/ancestry-tag-converter-linux.tar.gz \
            -C dist "$CLI_BIN" "${CLI_BIN}-gui"

      - uses: actions/upload-artifact@v7
        with:
          name: linux
          path: dist/ancestry-tag-converter-linux.tar.gz

  # ── Windows: zip with CLI + GUI ────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # fetch tags so manual builds can derive the version

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Ensure MinGW is on PATH (required for Fyne CGO)
        run: echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install fyne CLI
        run: go install fyne.io/tools/cmd/fyne@latest

      - name: Extract version
        id: ver
        shell: bash
        run: |
          ref="${GITHUB_REF_NAME#v}"
          if [[ "$ref" =~ ^[0-9]+(\.[0-9]+)*$ ]]; then
            version="$ref"
          else
            # Not a version tag (e.g. a manual run on a branch): fall back to the
            # most recent tag so the build still reports a real version.
            tag="$(git describe --tags --abbrev=0 2>/dev/null || true)"
            tag="${tag#v}"
            if [[ "$tag" =~ ^[0-9]+(\.[0-9]+)*$ ]]; then
              version="$tag"
            else
              version="0.0.0"
            fi
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build
        shell: bash
        run: |
          mkdir -p dist
          go build -ldflags="-s -w" -o "dist/${CLI_BIN}.exe" .
          # Package the GUI with fyne so the .exe carries the embedded icon and
          # is linked for the GUI subsystem (no console window). fyne reads extra
          # linker flags from GOFLAGS; inject the version so the About dialog
          # reports it (GOFLAGS is whitespace-split, so use a single token).
          (
            cd "$GUI_PKG"
            GOFLAGS="-ldflags=-X=main.version=${{ steps.ver.outputs.version }}" \
            fyne package -os windows \
              -icon "$GITHUB_WORKSPACE/packaging/icon.png" \
              -name "$APP_NAME" \
              -appID "$APP_ID" \
              -appVersion "${{ steps.ver.outputs.version }}" \
              -release
          )
          mv "$GUI_PKG/$APP_NAME.exe" "dist/${CLI_BIN}-gui.exe"

      - name: Sign executables
        uses: azure/trusted-signing-action@v0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_TRUSTED_SIGNING_PROFILE }}
          files-folder: dist
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Package
        shell: pwsh
        run: |
          Compress-Archive `
            -Path dist\*.exe `
            -DestinationPath dist\ancestry-tag-converter-windows.zip

      - uses: actions/upload-artifact@v7
        with:
          name: windows
          path: dist/ancestry-tag-converter-windows.zip

  # ── Publish GitHub Release ─────────────────────────────────────────────────
  release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          path: dist

      - name: Create GitHub Release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            dist/ancestry-tag-converter-mac.dmg \
            dist/ancestry-tag-converter-linux.tar.gz \
            dist/ancestry-tag-converter-windows.zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
