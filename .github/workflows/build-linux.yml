name: build-linux

on:
  workflow_dispatch:

env:
  APP_NAME: "Ancestry Tag Converter"
  APP_ID: "com.ajkessel.ancestry-tag-converter"
  CLI_BIN: "ancestry-tag-converter"
  GUI_PKG: "./cmd/ancestry-tag-converter-gui"

jobs:
  # ── Linux: tar.gz with CLI + GUI ───────────────────────────────────────────
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # fetch tags so manual builds can derive the version

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install Fyne system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev \
            libxxf86vm-dev \
            xorg-dev

      - name: Extract version
        id: ver
        run: |
          ref="${GITHUB_REF_NAME#v}"
          if [[ "$ref" =~ ^[0-9]+(\.[0-9]+)*$ ]]; then
            version="$ref"
          else
            # Not a version tag (e.g. a manual run on a branch): fall back to the
            # most recent tag so the build still reports a real version.
            tag="$(git describe --tags --abbrev=0 2>/dev/null || true)"
            tag="${tag#v}"
            if [[ "$tag" =~ ^[0-9]+(\.[0-9]+)*$ ]]; then
              version="$tag"
            else
              version="0.0.0"
            fi
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build
        run: |
          mkdir -p dist
          go build -ldflags="-s -w" -o "dist/$CLI_BIN" .
          # The GUI embeds its icon at runtime via SetIcon; inject the version so
          # the About dialog reports it (plain go build sets no app metadata).
          go build -ldflags="-s -w -X main.version=${{ steps.ver.outputs.version }}" \
            -o "dist/${CLI_BIN}-gui" "$GUI_PKG"

      - name: Package
        run: |
          tar -czf dist/ancestry-tag-converter-linux.tar.gz \
            -C dist "$CLI_BIN" "${CLI_BIN}-gui"

      - uses: actions/upload-artifact@v7
        with:
          name: linux
          path: dist/ancestry-tag-converter-linux.tar.gz
