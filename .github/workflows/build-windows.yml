name: build-windows

on:
  workflow_dispatch:

env:
  APP_NAME: "Ancestry Tag Converter"
  APP_ID: "com.ajkessel.ancestry-tag-converter"
  CLI_BIN: "ancestry-tag-converter"
  GUI_PKG: "./cmd/ancestry-tag-converter-gui"

jobs:
  # ── Windows: zip with CLI + GUI ────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # fetch tags so manual builds can derive the version

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Ensure MinGW is on PATH (required for Fyne CGO)
        run: echo "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install fyne CLI
        run: go install fyne.io/tools/cmd/fyne@latest

      - name: Extract version
        id: ver
        shell: bash
        run: |
          ref="${GITHUB_REF_NAME#v}"
          if [[ "$ref" =~ ^[0-9]+(\.[0-9]+)*$ ]]; then
            version="$ref"
          else
            # Not a version tag (e.g. a manual run on a branch): fall back to the
            # most recent tag so the build still reports a real version.
            tag="$(git describe --tags --abbrev=0 2>/dev/null || true)"
            tag="${tag#v}"
            if [[ "$tag" =~ ^[0-9]+(\.[0-9]+)*$ ]]; then
              version="$tag"
            else
              version="0.0.0"
            fi
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Build
        shell: bash
        run: |
          mkdir -p dist
          go build -ldflags="-s -w" -o "dist/${CLI_BIN}.exe" .
          # Package the GUI with fyne so the .exe carries the embedded icon and
          # is linked for the GUI subsystem (no console window). fyne reads extra
          # linker flags from GOFLAGS; inject the version so the About dialog
          # reports it (GOFLAGS is whitespace-split, so use a single token).
          (
            cd "$GUI_PKG"
            GOFLAGS="-ldflags=-X=main.version=${{ steps.ver.outputs.version }}" \
            fyne package -os windows \
              -icon "$GITHUB_WORKSPACE/packaging/icon.png" \
              -name "$APP_NAME" \
              -appID "$APP_ID" \
              -appVersion "${{ steps.ver.outputs.version }}" \
              -release
          )
          mv "$GUI_PKG/$APP_NAME.exe" "dist/${CLI_BIN}-gui.exe"

      - name: Sign executables
        uses: azure/trusted-signing-action@v0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_TRUSTED_SIGNING_PROFILE }}
          files-folder: dist
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Package
        shell: pwsh
        run: |
          Compress-Archive `
            -Path dist\*.exe `
            -DestinationPath dist\ancestry-tag-converter-windows.zip

      - uses: actions/upload-artifact@v7
        with:
          name: windows
          path: dist/ancestry-tag-converter-windows.zip
